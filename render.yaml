services:
  - type: web
    name: prinstine-pms-backend
    runtime: node
    plan: starter
    rootDir: server
    # Build API + React client (client/build) — primary UI remains on Vercel
    buildCommand: npm install && cd ../client && npm install && CI=false npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    disk:
      name: pms-data
      mountPath: /var/data
      sizeGB: 10
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: HOST
        value: 0.0.0.0
      - key: DB_PATH
        value: /var/data/pms.db
      - key: UPLOADS_DIR
        value: /var/data/uploads
      - key: API_BODY_LIMIT_MB
        value: 50
      - key: CERTIFICATE_MAX_FILE_SIZE_MB
        value: 0
      - key: FRONTEND_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 24h
      # System locked by default — set true on Render to restore logins
      - key: SYSTEM_ACCESS_ENABLED
        value: "false"
      - key: ENCRYPTION_KEY
        sync: false
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false
